<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#0B1221"/>

  <!-- Large X as background watermark -->
  <text x="512" y="620" text-anchor="middle" font-family="'Helvetica Neue', 'Impact', sans-serif" font-weight="900" font-size="700" fill="#00F0FF" opacity="0.04" letter-spacing="-30">X</text>

  <!-- C letter -->
  <text x="340" y="580" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="360" fill="#FFFFFF" letter-spacing="0">C</text>

  <!-- X letter with gradient -->
  <defs>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0088FF"/>
    </linearGradient>
  </defs>
  <text x="640" y="580" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="360" fill="url(#xGrad)">X</text>

  <!-- Thin separator between C and X -->
  <rect x="478" y="340" width="2" height="260" fill="#00F0FF" opacity="0.25" rx="1"/>

  <!-- Bottom tag line: SWITCH -->
  <text x="512" y="700" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-weight="600" font-size="64" fill="#00F0FF" opacity="0.5" letter-spacing="20">SWITCH</text>

  <!-- Accent dot -->
  <circle cx="512" cy="750" r="4" fill="#00F0FF" opacity="0.4"/>
</svg>
