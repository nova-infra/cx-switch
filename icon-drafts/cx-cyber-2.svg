<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#0D1117"/>

  <!-- CX with split color effect -->
  <defs>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Shadow text offset -->
  <text x="518" y="546" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="420" fill="#A855F7" opacity="0.3" letter-spacing="-15">CX</text>

  <!-- Main text -->
  <text x="512" y="540" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="420" fill="#00F0FF" letter-spacing="-15">CX</text>

  <!-- Horizontal accent bar -->
  <rect x="260" y="600" width="504" height="4" rx="2" fill="#00F0FF" opacity="0.8"/>

  <!-- Switch arrows centered under bar -->
  <g transform="translate(512, 650)">
    <!-- Right arrow -->
    <line x1="-60" y1="0" x2="50" y2="0" stroke="#A855F7" stroke-width="2.5" opacity="0.8"/>
    <polyline points="38,-8 52,0 38,8" fill="none" stroke="#A855F7" stroke-width="2.5" opacity="0.8"/>
    <!-- Left arrow -->
    <line x1="60" y1="18" x2="-50" y2="18" stroke="#00F0FF" stroke-width="2.5" opacity="0.8"/>
    <polyline points="-38,10 -52,18 -38,26" fill="none" stroke="#00F0FF" stroke-width="2.5" opacity="0.8"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#00F0FF" stroke-width="2" opacity="0.15" fill="none">
    <polyline points="40,40 40,80"/>
    <polyline points="40,40 80,40"/>
    <polyline points="984,40 944,40"/>
    <polyline points="984,40 984,80"/>
    <polyline points="40,984 40,944"/>
    <polyline points="40,984 80,984"/>
    <polyline points="984,984 944,984"/>
    <polyline points="984,984 984,944"/>
  </g>
</svg>
