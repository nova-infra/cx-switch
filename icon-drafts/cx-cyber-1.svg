<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#0A0E17"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1024" height="1024" fill="url(#grid)"/>

  <!-- Glitch line -->
  <rect x="0" y="498" width="1024" height="2" fill="#FF00AA" opacity="0.35"/>
  <rect x="200" y="530" width="400" height="1" fill="#FF00AA" opacity="0.2"/>

  <!-- CX main text -->
  <text x="512" y="560" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-weight="900" font-size="380" fill="#00F0FF" letter-spacing="-10">CX</text>

  <!-- Scan lines over text -->
  <defs>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#0A0E17" opacity="0.3"/>
    </pattern>
    <clipPath id="textClip">
      <text x="512" y="560" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-weight="900" font-size="380" letter-spacing="-10">CX</text>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" fill="url(#scanlines)" clip-path="url(#textClip)"/>

  <!-- Switch arrows under CX -->
  <g transform="translate(512, 640)" fill="none" stroke="#00F0FF" stroke-width="3" opacity="0.6">
    <line x1="-80" y1="0" x2="80" y2="0"/>
    <polyline points="60,-10 80,0 60,10"/>
    <line x1="80" y1="20" x2="-80" y2="20"/>
    <polyline points="-60,10 -80,20 -60,30"/>
  </g>

  <!-- Subtle glow behind CX -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="35%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#glow)"/>
</svg>
